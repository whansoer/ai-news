name: Collect AI News

on:
  schedule:
    - cron: '17 0 * * *'    # UTC 0:17 (北京时间 ~8:17)
    - cron: '17 8 * * *'    # UTC 8:17 (北京时间 ~16:17)
    - cron: '17 16 * * *'   # UTC 16:17 (北京时间 ~0:17)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect AI news
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python scripts/collect.py

      - name: Translate to Chinese
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: python scripts/translate.py

      - name: Commit updated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update ai news [skip ci]"
          file_pattern: data/news.json data/news_zh.json
