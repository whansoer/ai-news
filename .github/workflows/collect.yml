name: Collect AI News

on:
  schedule:
    - cron: '0 0 * * *'     # UTC 0:00 (北京时间 8:00)
    - cron: '0 0 * * 1'     # Weekly: Monday UTC 0:00 (outline+script)
    - cron: '0 8 * * *'     # UTC 8:00 (北京时间 16:00)
    - cron: '0 16 * * *'    # UTC 16:00 (北京时间 24:00)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect AI news
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python scripts/collect.py

      - name: Classify & score
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/classify.py

      - name: Translate to Chinese
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/translate.py

      - name: Summarize articles
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/summarize.py

      - name: Generate stats
        run: python scripts/stats.py

      - name: Generate weekly digest
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/weekly.py

      - name: Generate daily briefing
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/briefing.py

      - name: Generate topic outline (weekly)
        if: github.event.schedule == '0 0 * * 1'
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/outline.py

      - name: Generate video script (weekly)
        if: github.event.schedule == '0 0 * * 1'
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/script.py

      - name: Init optional data files
        run: |
          if [ ! -f data/favorites.json ]; then
            echo '{"ids":[],"updated":"2026-01-01T00:00:00Z"}' > data/favorites.json
          fi
          if [ ! -f data/outline.json ]; then
            echo '{"topic":"","hook":"","sections":[],"conclusion":"","suggested_title":"","updated":""}' > data/outline.json
          fi
          if [ ! -f data/script.json ]; then
            echo '{"topic":"","scripts":{"30s":"","60s":""},"hook":"","updated":""}' > data/script.json
          fi
          if [ ! -f data/briefing.json ]; then
            echo '{"text":"","top_items":[],"updated":""}' > data/briefing.json
          fi
          if [ ! -f data/weekly.json ]; then
            echo '{"title":"","summary":"","highlights":[],"top_ids":[],"updated":""}' > data/weekly.json
          fi
          if [ ! -f data/favorites_archive.json ]; then
            echo '{"updated":"","total":0,"items":[]}' > data/favorites_archive.json
          fi

      - name: Archive old news
        run: python scripts/archive.py

      - name: Prune expired archives
        run: python scripts/prune.py

      - name: Build search index
        run: python scripts/build_search.py

      - name: Run Pagefind
        run: npx --yes pagefind --site data --output-path data/pagefind --glob "search.html"

      - name: Commit updated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update ai news [skip ci]"
          file_pattern: data/news.json data/news_zh.json data/stats.json data/weekly.json data/briefing.json data/outline.json data/script.json data/favorites.json data/favorites_archive.json data/archive/ data/search.html data/pagefind/
