name: Collect AI News

on:
  schedule:
    - cron: '17 0 * * *'    # UTC 0:17 (北京时间 ~8:17)
    - cron: '17 8 * * *'    # UTC 8:17 (北京时间 ~16:17)
    - cron: '17 16 * * *'   # UTC 16:17 (北京时间 ~0:17)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect AI news
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python scripts/collect.py

      - name: Classify & score
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/classify.py

      - name: Translate to Chinese
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/translate.py

      - name: Summarize articles
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/summarize.py

      - name: Generate stats
        run: python scripts/stats.py

      - name: Generate weekly digest
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python scripts/weekly.py

      - name: Init favorites.json
        run: |
          if [ ! -f data/favorites.json ]; then
            echo '{"ids":[],"updated":"2026-01-01T00:00:00Z"}' > data/favorites.json
          fi

      - name: Archive old news
        run: python scripts/archive.py

      - name: Prune expired archives
        run: python scripts/prune.py

      - name: Build search index
        run: python scripts/build_search.py

      - name: Run Pagefind
        run: npx pagefind --source data --output data/pagefind --glob "search.html"

      - name: Commit updated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update ai news [skip ci]"
          file_pattern: data/news.json data/news_zh.json data/stats.json data/weekly.json data/favorites.json data/favorites_archive.json data/archive/ data/search.html data/pagefind/
