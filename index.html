<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 新闻收集器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f5;
    --card-bg: #fff;
    --text: #1a1a1a;
    --text-secondary: #666;
    --border: #e5e5e5;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --tag-bg: #f0f0f0;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
    --skeleton: #e8e8e8;
  }

  [data-theme="dark"] {
    --bg: #111827;
    --card-bg: #1f2937;
    --text: #f3f4f6;
    --text-secondary: #9ca3af;
    --border: #374151;
    --accent: #60a5fa;
    --accent-light: #1e3a5f;
    --tag-bg: #374151;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
    --skeleton: #374151;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
  }

  .container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }

  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 0 16px; position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .update-time { font-size: 12px; color: var(--text-secondary); }
  .theme-toggle {
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--card-bg); cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center; transition: transform .2s;
  }
  .theme-toggle:hover { transform: scale(1.1); }

  .lang-toggle {
    padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card-bg); cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); transition: all .2s; white-space: nowrap;
  }
  .lang-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .lang-toggle.active-lang { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Filter bar */
  .filter-bar {
    display: flex; gap: 8px; padding: 12px 0; flex-wrap: wrap;
    position: sticky; top: 88px; background: var(--bg); z-index: 9;
  }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text-secondary); cursor: pointer;
    font-size: 14px; transition: all .2s; white-space: nowrap;
  }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .search-box {
    flex: 1; min-width: 160px; padding: 6px 16px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--card-bg); color: var(--text);
    font-size: 14px; outline: none; transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-secondary); }

  /* Skeleton */
  .skeleton-card {
    background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .skeleton-line { height: 14px; background: var(--skeleton); border-radius: 7px; margin-bottom: 10px; }
  .skeleton-line:first-child { width: 70%; height: 18px; }
  .skeleton-line:nth-child(2) { width: 50%; }
  .skeleton-line:last-child { width: 90%; height: 12px; margin-bottom: 0; }

  /* News card */
  .news-list { padding-bottom: 40px; }
  .news-card {
    background: var(--card-bg); border-radius: 12px; padding: 20px;
    margin-bottom: 12px; box-shadow: var(--shadow); transition: transform .15s, box-shadow .15s;
  }
  .news-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }

  .card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .card-source {
    font-size: 12px; font-weight: 600; color: var(--accent);
    background: var(--accent-light); padding: 2px 10px; border-radius: 10px;
  }
  .card-date { font-size: 12px; color: var(--text-secondary); }

  .card-title {
    font-size: 17px; font-weight: 600; line-height: 1.4; margin-bottom: 8px;
  }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }

  .card-summary { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 10px; }

  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .card-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 8px;
    background: var(--tag-bg); color: var(--text-secondary);
  }

  .category-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px;
    vertical-align: middle;
  }
  .cat-industry { background: #3b82f6; }
  .cat-tools { background: #10b981; }
  .cat-academic { background: #8b5cf6; }

  /* Empty state */
  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

  /* Error state */
  .error-state { text-align: center; padding: 80px 20px; }
  .error-state .icon { font-size: 48px; margin-bottom: 12px; }
  .error-state .retry-btn {
    margin-top: 16px; padding: 8px 24px; border-radius: 20px;
    background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 14px;
  }

  /* Footer */
  .footer {
    text-align: center; padding: 24px; font-size: 12px; color: var(--text-secondary);
    border-top: 1px solid var(--border);
  }

  /* Responsive */
  @media (max-width: 480px) {
    .header h1 { font-size: 20px; }
    .filter-bar { gap: 6px; }
    .filter-btn { padding: 5px 12px; font-size: 13px; }
    .card-title { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <h1>AI 新闻</h1>
    <div class="header-right">
      <span class="update-time" id="updateTime"></span>
      <button class="lang-toggle active-lang" id="langZh">中</button>
      <button class="lang-toggle" id="langEn">EN</button>
      <button class="theme-toggle" id="themeToggle" title="切换暗色模式" aria-label="切换暗色模式">&#9728;</button>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" data-cat="all">全部</button>
    <button class="filter-btn" data-cat="industry">&#9679; 行业</button>
    <button class="filter-btn" data-cat="tools">&#9679; 工具</button>
    <button class="filter-btn" data-cat="academic">&#9679; 学术</button>
    <input class="search-box" id="searchBox" type="text" placeholder="搜索新闻..." />
  </div>

  <div id="skeletonContainer"></div>
  <div class="news-list" id="newsList" style="display:none;"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">&#128240;</div>
    <p>暂无新闻</p>
    <p style="font-size:13px;margin-top:4px;">请稍后再来查看</p>
  </div>
  <div class="error-state" id="errorState" style="display:none;">
    <div class="icon">&#9888;</div>
    <p>加载失败</p>
    <button class="retry-btn" onclick="loadNews()">重试</button>
  </div>

  <footer class="footer">
    <span id="totalCount"></span> 条新闻 &middot; 每 8 小时自动更新 &middot; powered by GitHub Actions
  </footer>
</div>

<script>
(function () {
  const CATEGORY_LABELS = { industry: '行业', tools: '工具', academic: '学术' };
  const CATEGORY_COLORS = { industry: 'cat-industry', tools: 'cat-tools', academic: 'cat-academic' };
  let allNews = [];
  let zhMap = {};       // id → {title_zh, summary_zh, tags_zh}
  let currentCat = 'all';
  let searchQuery = '';
  let currentLang = localStorage.getItem('ai-news-lang') || 'zh';

  // ========== Theme ==========
  const themeToggle = document.getElementById('themeToggle');
  const savedTheme = localStorage.getItem('ai-news-theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  themeToggle.innerHTML = savedTheme === 'dark' ? '&#9789;' : '&#9728;';

  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    themeToggle.innerHTML = next === 'dark' ? '&#9789;' : '&#9728;';
    localStorage.setItem('ai-news-theme', next);
  });

  // ========== Language ==========
  const langZh = document.getElementById('langZh');
  const langEn = document.getElementById('langEn');

  function setLangUI(lang) {
    if (lang === 'zh') {
      langZh.classList.add('active-lang');
      langEn.classList.remove('active-lang');
    } else {
      langEn.classList.add('active-lang');
      langZh.classList.remove('active-lang');
    }
  }
  setLangUI(currentLang);

  langZh.addEventListener('click', () => {
    currentLang = 'zh';
    localStorage.setItem('ai-news-lang', 'zh');
    setLangUI('zh');
    render();
  });

  langEn.addEventListener('click', () => {
    currentLang = 'en';
    localStorage.setItem('ai-news-lang', 'en');
    setLangUI('en');
    render();
  });

  // ========== Skeleton ==========
  function showSkeleton() {
    const el = document.getElementById('skeletonContainer');
    el.innerHTML = Array.from({ length: 5 }, () =>
      '<div class="skeleton-card">' +
        '<div class="skeleton-line"></div>' +
        '<div class="skeleton-line"></div>' +
        '<div class="skeleton-line"></div>' +
      '</div>'
    ).join('');
    el.style.display = 'block';
    document.getElementById('newsList').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('errorState').style.display = 'none';
  }

  // ========== Load ==========
  async function loadNews() {
    showSkeleton();
    try {
      const [respEn, respZh] = await Promise.all([
        fetch('data/news.json'),
        fetch('data/news_zh.json').catch(() => null)
      ]);

      if (!respEn.ok) throw new Error('HTTP ' + respEn.status);
      const dataEn = await respEn.json();
      allNews = dataEn.items || [];
      document.getElementById('updateTime').textContent =
        '更新 ' + formatTime(dataEn.updated);
      document.getElementById('totalCount').textContent = dataEn.total || allNews.length;

      if (respZh && respZh.ok) {
        const dataZh = await respZh.json();
        zhMap = {};
        (dataZh.items || []).forEach(item => { zhMap[item.id] = item; });
      }

      document.getElementById('skeletonContainer').style.display = 'none';
      render();
    } catch (e) {
      console.error('加载新闻失败:', e);
      document.getElementById('skeletonContainer').style.display = 'none';
      document.getElementById('newsList').style.display = 'none';
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }
  }

  function formatTime(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return '刚刚';
    if (diffMin < 60) return diffMin + '分钟前';
    const diffHr = Math.floor(diffMin / 60);
    if (diffHr < 24) return diffHr + '小时前';
    const diffDay = Math.floor(diffHr / 24);
    if (diffDay < 7) return diffDay + '天前';
    return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
  }

  function t(n, field) {
    if (currentLang === 'en') return n[field] || '';
    const zh = zhMap[n.id];
    const zhField = field + '_zh';
    if (zh && zh[zhField]) return zh[zhField];
    // 中文兜底：无翻译时显示英文原文
    return n[field] || '';
  }

  // ========== Render ==========
  function render() {
    let filtered = allNews;

    if (currentCat !== 'all') {
      filtered = filtered.filter(n => n.category === currentCat);
    }

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(n =>
        n.title.toLowerCase().includes(q) ||
        t(n, 'title').toLowerCase().includes(q) ||
        (n.summary || '').toLowerCase().includes(q) ||
        t(n, 'summary').toLowerCase().includes(q) ||
        (n.tags || []).some(tag => tag.toLowerCase().includes(q))
      );
    }

    const listEl = document.getElementById('newsList');
    const emptyEl = document.getElementById('emptyState');

    if (filtered.length === 0) {
      listEl.style.display = 'none';
      emptyEl.style.display = 'block';
      return;
    }

    emptyEl.style.display = 'none';
    listEl.style.display = 'block';
    listEl.innerHTML = filtered.map(n => {
      const title = t(n, 'title');
      const summary = t(n, 'summary');
      const tags = currentLang === 'zh' && zhMap[n.id] && zhMap[n.id].tags_zh
        ? zhMap[n.id].tags_zh : (n.tags || []);
      return `
      <article class="news-card">
        <div class="card-meta">
          <span class="card-source">${esc(n.source)}</span>
          ${n.category ? `<span style="font-size:11px;color:var(--text-secondary);">
            <span class="category-dot ${CATEGORY_COLORS[n.category] || ''}"></span>${CATEGORY_LABELS[n.category] || n.category}
          </span>` : ''}
          <span class="card-date">${formatTime(n.published)}</span>
        </div>
        <h2 class="card-title">
          <a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(title)}</a>
        </h2>
        ${summary ? `<p class="card-summary">${esc(summary)}</p>` : ''}
        ${tags.length ? `
          <div class="card-tags">${tags.map(t => `<span class="card-tag">${esc(t)}</span>`).join('')}</div>
        ` : ''}
      </article>
    `}).join('');
  }

  function esc(s) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    return String(s).replace(/[&<>"']/g, c => map[c]);
  }

  // ========== Filters ==========
  document.querySelector('.filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });

  document.getElementById('searchBox').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    render();
  });

  // ========== Init ==========
  loadNews();
})();
</script>
</body>
</html>
