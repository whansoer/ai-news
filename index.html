<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 新闻收集器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f5; --card-bg: #fff; --text: #1a1a1a; --text-secondary: #666;
    --border: #e5e5e5; --accent: #2563eb; --accent-light: #dbeafe;
    --tag-bg: #f0f0f0; --shadow: 0 1px 3px rgba(0,0,0,.08); --skeleton: #e8e8e8;
    --fire: #f59e0b; --green: #10b981; --purple: #8b5cf6; --red: #ef4444;
  }

  [data-theme="dark"] {
    --bg: #111827; --card-bg: #1f2937; --text: #f3f4f6; --text-secondary: #9ca3af;
    --border: #374151; --accent: #60a5fa; --accent-light: #1e3a5f;
    --tag-bg: #374151; --shadow: 0 1px 3px rgba(0,0,0,.3); --skeleton: #374151;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; transition: background .3s, color .3s;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 20px 16px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .update-time { font-size: 12px; color: var(--text-secondary); }
  .theme-toggle, .lang-toggle {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--card-bg); cursor: pointer; font-size: 14px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; transition: transform .2s;
    color: var(--text-secondary);
  }
  .theme-toggle:hover, .lang-toggle:hover { transform: scale(1.1); }
  .lang-toggle.active-lang { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Weekly banner */
  .weekly-banner {
    background: linear-gradient(135deg, #1e40af, #3b82f6); color: #fff; border-radius: 12px;
    padding: 16px 20px; margin-bottom: 16px; cursor: pointer; transition: transform .15s;
    display: none;
  }
  .weekly-banner:hover { transform: translateY(-1px); }
  .weekly-banner h3 { font-size: 15px; margin-bottom: 6px; }
  .weekly-banner p { font-size: 13px; opacity: .9; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 6px; padding: 8px 0; flex-wrap: wrap; position: sticky; top: 76px; background: var(--bg); z-index: 9; }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text-secondary); cursor: pointer;
    font-size: 13px; transition: all .2s; white-space: nowrap;
  }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .search-box {
    flex: 1; min-width: 140px; padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--card-bg); color: var(--text);
    font-size: 13px; outline: none; transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-secondary); }

  /* Sort bar */
  .sort-bar { display: flex; align-items: center; gap: 12px; padding: 8px 0 4px; font-size: 13px; color: var(--text-secondary); }
  .sort-btn { cursor: pointer; color: var(--accent); font-weight: 600; }
  .sort-btn:not(.active-sort) { color: var(--text-secondary); font-weight: 400; }

  /* News card */
  .news-list { padding-bottom: 20px; }
  .news-card {
    background: var(--card-bg); border-radius: 12px; padding: 18px;
    margin-bottom: 10px; box-shadow: var(--shadow); transition: transform .15s, box-shadow .15s;
  }
  .news-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }

  .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .card-source {
    font-size: 11px; font-weight: 600; color: var(--accent);
    background: var(--accent-light); padding: 2px 8px; border-radius: 10px;
  }
  .card-score { font-size: 11px; font-weight: 700; color: var(--fire); }
  .card-date { font-size: 11px; color: var(--text-secondary); }

  .card-title { font-size: 16px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }

  .card-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 6px; }
  .card-oneliner {
    font-size: 13px; color: var(--accent); line-height: 1.4; margin-bottom: 6px;
    padding: 6px 10px; background: var(--accent-light); border-radius: 6px;
    border-left: 3px solid var(--accent);
  }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .card-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 8px;
    background: var(--tag-bg); color: var(--text-secondary); cursor: pointer;
    transition: background .15s;
  }
  .card-tag:hover { background: var(--accent); color: #fff; }

  /* Favorites */
  .card-fav-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--card-bg); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s, background .2s; flex-shrink: 0;
  }
  .card-fav-btn:hover { transform: scale(1.15); }
  .card-fav-btn.faved { background: #fef2f2; border-color: #fca5a5; }
  .card-fav-btn.faved::after { content: '❤️'; font-size: 14px; }

  /* Related section */
  .related-section {
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border);
    font-size: 11px; color: var(--text-secondary);
  }
  .related-section .related-label { font-weight: 600; margin-bottom: 4px; }
  .related-item {
    display: inline-block; margin: 2px 6px 2px 0; padding: 2px 8px;
    background: var(--tag-bg); border-radius: 10px; cursor: pointer;
    transition: background .15s; font-size: 11px; max-width: 220px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    vertical-align: middle;
  }
  .related-item:hover { background: var(--accent); color: #fff; }

  /* Viewed indicator */
  .news-card.viewed .card-title a { color: var(--text-secondary); }
  .news-card.viewed .card-title a:visited { color: var(--text-secondary); }
  .viewed-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); vertical-align: middle; margin-right: 4px;
  }
  .news-card:not(.viewed) .viewed-dot { background: var(--green); }

  /* Stats panel */
  .stats-toggle {
    padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text-secondary); cursor: pointer;
    font-size: 13px; white-space: nowrap; transition: all .2s;
  }
  .stats-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .stats-panel {
    display: none; background: var(--card-bg); border-radius: 12px; padding: 20px;
    margin-bottom: 16px; box-shadow: var(--shadow);
  }
  .stats-panel.open { display: block; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .stats-section h4 { font-size: 14px; margin-bottom: 10px; color: var(--text); }
  .stat-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px;
  }
  .stat-bar-name { width: 80px; text-align: right; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
  .stat-bar-track { flex: 1; height: 8px; background: var(--skeleton); border-radius: 4px; overflow: hidden; }
  .stat-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .5s; }
  .stat-bar-count { width: 32px; font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }

  .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag-cloud-item {
    font-size: 12px; padding: 3px 10px; border-radius: 12px;
    background: var(--tag-bg); color: var(--text-secondary); cursor: pointer; transition: all .15s;
  }
  .tag-cloud-item:hover { background: var(--accent); color: #fff; }

  .daily-chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; }
  .daily-bar { flex: 1; background: var(--accent); border-radius: 3px 3px 0 0; transition: height .5s; min-width: 12px; position: relative; }
  .daily-bar-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-secondary); }
  .daily-bar-count { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-secondary); }

  /* Top 10 */
  .top10-list { list-style: none; }
  .top10-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
  .top10-item:last-child { border-bottom: none; }
  .top10-rank { font-weight: 700; color: var(--fire); width: 20px; flex-shrink: 0; }
  .top10-title { flex: 1; }
  .top10-score { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }

  /* Skeleton */
  .skeleton-card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .skeleton-line { height: 12px; background: var(--skeleton); border-radius: 6px; margin-bottom: 8px; }
  .skeleton-line:first-child { width: 60%; height: 16px; }
  .skeleton-line:nth-child(2) { width: 40%; }
  .skeleton-line:last-child { width: 80%; margin-bottom: 0; }

  /* Deep search (Pagefind) */
  .deep-results { margin-top: 16px; }
  .deep-results-title {
    font-size: 13px; color: var(--text-secondary); margin-bottom: 8px;
    padding: 8px 12px; background: var(--accent-light); border-radius: 8px;
  }
  .deep-result-card {
    background: var(--card-bg); border-radius: 10px; padding: 14px;
    margin-bottom: 8px; box-shadow: var(--shadow); border-left: 3px solid var(--accent);
  }
  .deep-result-card .dr-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .deep-result-card .dr-title a { color: var(--text); text-decoration: none; }
  .deep-result-card .dr-title a:hover { color: var(--accent); }
  .deep-result-card .dr-excerpt { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .deep-result-card .dr-excerpt mark { background: #fef08a; color: #1a1a1a; padding: 0 2px; border-radius: 2px; }
  .deep-result-card .dr-meta { font-size: 11px; color: var(--text-secondary); margin-top: 6px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .deep-result-card .dr-source { font-weight: 600; color: var(--accent); background: var(--accent-light); padding: 1px 6px; border-radius: 8px; }

  .empty-state, .error-state { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
  .empty-state .icon, .error-state .icon { font-size: 48px; margin-bottom: 12px; }
  .retry-btn {
    margin-top: 12px; padding: 8px 20px; border-radius: 20px;
    background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 13px;
  }

  /* Creator panel */
  .creator-panel { display: none; }
  .creator-panel.open { display: block; }
  .creator-section { background: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .creator-section h3 { font-size: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .creator-section .briefing-text { font-size: 14px; line-height: 1.7; color: var(--text); }
  .difficulty-bar { display: flex; gap: 6px; margin-bottom: 12px; }
  .diff-btn {
    padding: 4px 14px; border-radius: 14px; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text-secondary); cursor: pointer;
    font-size: 12px; transition: all .2s;
  }
  .diff-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .material-card {
    background: var(--card-bg); border-radius: 10px; padding: 14px;
    margin-bottom: 8px; box-shadow: var(--shadow); border-left: 3px solid var(--purple);
  }
  .material-card .mat-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .material-card .mat-title a { color: var(--text); text-decoration: none; }
  .material-card .mat-facts { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; line-height: 1.5; }
  .material-card .mat-quote { font-size: 12px; color: var(--accent); font-style: italic; padding: 6px 10px; background: var(--accent-light); border-radius: 6px; margin: 4px 0; }
  .copy-btn {
    display: inline-block; padding: 2px 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text-secondary); cursor: pointer;
    font-size: 11px; transition: all .15s; margin-left: 4px;
  }
  .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }
  .collapse-header {
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; user-select: none;
  }
  .collapse-header:hover { color: var(--accent); }
  .collapse-content { display: none; padding-top: 8px; }
  .collapse-content.open { display: block; }
  .collapse-arrow { transition: transform .2s; font-size: 12px; }
  .collapse-arrow.open { transform: rotate(90deg); }
  .outline-section { margin-bottom: 12px; padding-left: 12px; border-left: 2px solid var(--border); }
  .outline-section h4 { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .outline-section p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .outline-refs { font-size: 11px; color: var(--accent); margin-top: 4px; }
  .script-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .script-tab {
    padding: 3px 12px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text-secondary); cursor: pointer; font-size: 12px;
  }
  .script-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .script-text { font-size: 13px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }

  .footer { text-align: center; padding: 20px; font-size: 11px; color: var(--text-secondary); border-top: 1px solid var(--border); }

  @media (max-width: 768px) {
    .header h1 { font-size: 20px; }
    .header { padding: 12px 0 8px; }
    .stats-grid { grid-template-columns: 1fr; }
    .stat-bar-name { width: 60px; }
    .filter-btn { padding: 6px 12px; font-size: 12px; min-height: 36px; }
    .filter-bar { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 4px; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .search-box { min-width: 120px; min-height: 36px; }
    .card-fav-btn { width: 44px; height: 44px; }
    .card-title { font-size: 15px; }
    .related-item { max-width: 160px; }
    .stats-toggle, .sort-btn { min-height: 36px; display: flex; align-items: center; }
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <h1>AI 新闻</h1>
    <div class="header-right">
      <span class="update-time" id="updateTime"></span>
      <button class="lang-toggle active-lang" id="langZh">中</button>
      <button class="lang-toggle" id="langEn">EN</button>
      <a href="explore.html" class="nav-link" title="知识图谱" style="font-size:18px;text-decoration:none;display:flex;align-items:center;justify-content:center;width:36px;height:36px;">&#128301;</a>
      <button class="theme-toggle" id="themeToggle" title="暗色模式">&#9728;</button>
    </div>
  </header>

  <!-- Weekly banner -->
  <div class="weekly-banner" id="weeklyBanner" onclick="toggleWeekly()">
    <h3 id="weeklyTitle"></h3>
    <p id="weeklySummary"></p>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-btn active" data-cat="all">全部</button>
    <button class="filter-btn" data-cat="model">模型</button>
    <button class="filter-btn" data-cat="oss">开源</button>
    <button class="filter-btn" data-cat="product">产品</button>
    <button class="filter-btn" data-cat="research">学术</button>
    <button class="filter-btn" data-cat="funding">融资</button>
    <button class="filter-btn" data-cat="policy">政策</button>
    <button class="filter-btn" data-cat="favorites">收藏</button>
    <button class="filter-btn" data-cat="creator">创作</button>
    <input class="search-box" id="searchBox" type="text" placeholder="搜索..." />
    <button class="stats-toggle" id="statsToggle">统计</button>
  </div>

  <!-- Sort bar -->
  <div class="sort-bar">
    <span>排序：</span>
    <span class="sort-btn active-sort" data-sort="hot" id="sortHot">最热</span>
    <span>|</span>
    <span class="sort-btn" data-sort="new" id="sortNew">最新</span>
    <span style="margin-left:auto;" id="resultCount"></span>
  </div>

  <!-- Stats panel -->
  <div class="stats-panel" id="statsPanel">
    <div class="stats-grid">
      <div class="stats-section">
        <h4>来源分布</h4>
        <div id="statsSources"></div>
      </div>
      <div class="stats-section">
        <h4>分类分布</h4>
        <div id="statsCats"></div>
      </div>
      <div class="stats-section">
        <h4>热门标签</h4>
        <div class="tag-cloud" id="statsTags"></div>
      </div>
      <div class="stats-section">
        <h4>每日趋势（7天）</h4>
        <div class="daily-chart" id="statsDaily"></div>
      </div>
    </div>
    <div style="margin-top:16px;">
      <h4 style="font-size:14px;margin-bottom:8px;">热度 Top 10</h4>
      <ul class="top10-list" id="statsTop10"></ul>
    </div>
  </div>

  <!-- Creator panel -->
  <div class="creator-panel" id="creatorPanel">
    <div class="creator-section" id="briefingSection" style="display:none;">
      <h3>每日简报</h3>
      <p class="briefing-text" id="briefingText"></p>
      <div style="margin-top:6px;font-size:12px;color:var(--text-secondary);" id="briefingItems"></div>
    </div>

    <div class="creator-section">
      <h3>创作素材</h3>
      <div class="difficulty-bar" id="difficultyBar">
        <button class="diff-btn active" data-diff="all">全部</button>
        <button class="diff-btn" data-diff="beginner">入门</button>
        <button class="diff-btn" data-diff="intermediate">进阶</button>
        <button class="diff-btn" data-diff="advanced">专家</button>
      </div>
      <div id="materialList"></div>
    </div>

    <div class="creator-section" id="outlineSection" style="display:none;">
      <div class="collapse-header" id="outlineToggle">
        <h3>话题大纲</h3>
        <span class="collapse-arrow" id="outlineArrow">▶</span>
      </div>
      <div class="collapse-content" id="outlineContent"></div>
    </div>

    <div class="creator-section" id="scriptSection" style="display:none;">
      <div class="collapse-header" id="scriptToggle">
        <h3>口播稿</h3>
        <span class="collapse-arrow" id="scriptArrow">▶</span>
      </div>
      <div class="collapse-content" id="scriptContent"></div>
    </div>
  </div>

  <div id="skeletonContainer"></div>
  <div class="news-list" id="newsList" style="display:none;"></div>
  <div class="deep-results" id="deepSearchResults" style="display:none;"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">&#128240;</div><p>暂无新闻</p>
  </div>
  <div class="error-state" id="errorState" style="display:none;">
    <div class="icon">&#9888;</div><p>加载失败</p>
    <button class="retry-btn" onclick="loadAll()">重试</button>
  </div>

  <footer class="footer"><span id="totalCount"></span> 条新闻 &middot; 每8小时更新 &middot; powered by GitHub Actions</footer>
</div>

<script>
(function () {
  const CAT_LABELS = { model:'模型发布', oss:'开源项目', product:'产品/API', research:'学术研究', funding:'融资收购', policy:'政策监管' };
  let allNews = [], zhMap = {}, statsData = null, weeklyData = null;
  let briefingData = null, outlineData = null, scriptData = null;
  let currentCat = 'all', searchQuery = '', currentSort = 'hot', currentLang = localStorage.getItem('ai-news-lang') || 'zh';

  // Favorites
  let favorites = {};
  try { favorites = JSON.parse(localStorage.getItem('ai-news-favorites') || '{}'); } catch(e) { favorites = {}; }
  function saveFavorites() { localStorage.setItem('ai-news-favorites', JSON.stringify(favorites)); }
  function toggleFavorite(id, title, source) {
    if (favorites[id]) {
      delete favorites[id];
    } else {
      favorites[id] = { savedAt: Date.now(), title: title, source: source };
    }
    saveFavorites();
    render();
  }
  function isFaved(id) { return !!favorites[id]; }

  // View history
  let viewed = {};
  try { viewed = JSON.parse(localStorage.getItem('ai-news-viewed') || '{}'); } catch(e) { viewed = {}; }
  function saveViewed() { localStorage.setItem('ai-news-viewed', JSON.stringify(viewed)); }
  function markViewed(id) {
    viewed[id] = Date.now();
    saveViewed();
  }

  // Related recommendations
  function getRelated(item, all, n) {
    n = n || 5;
    var itemTags = (item.tags || []).map(function(t){ return t.toLowerCase(); });
    if (itemTags.length === 0) return [];
    var scored = [];
    for (var i = 0; i < all.length; i++) {
      var other = all[i];
      if (other.id === item.id) continue;
      var otherTags = (other.tags || []).map(function(t){ return t.toLowerCase(); });
      var shared = 0;
      for (var j = 0; j < itemTags.length; j++) {
        if (otherTags.indexOf(itemTags[j]) >= 0) shared++;
      }
      if (shared >= 2) scored.push({ item: other, shared: shared });
    }
    scored.sort(function(a, b){ return b.shared - a.shared; });
    return scored.slice(0, n).map(function(s){ return s.item; });
  }

  // Theme
  const themeToggle = document.getElementById('themeToggle');
  const savedTheme = localStorage.getItem('ai-news-theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  themeToggle.innerHTML = savedTheme === 'dark' ? '&#9789;' : '&#9728;';
  themeToggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    themeToggle.innerHTML = next === 'dark' ? '&#9789;' : '&#9728;';
    localStorage.setItem('ai-news-theme', next);

    document.getElementById('skeletonContainer').innerHTML = Array.from({ length: 5 }, () =>

  // Load
  async function loadAll() {
    showSkeleton();
    try {
      const [rEn, rZh, rStats, rWeekly, rBrief, rOutline, rScript] = await Promise.all([
        fetch('data/news.json'),
        fetch('data/news_zh.json').catch(() => null),
        fetch('data/stats.json').catch(() => null),
        fetch('data/weekly.json').catch(() => null),
        fetch('data/briefing.json').catch(() => null),
        fetch('data/outline.json').catch(() => null),
        fetch('data/script.json').catch(() => null),
      ]);
      if (!rEn.ok) throw new Error('HTTP ' + rEn.status);
      const dEn = await rEn.json();
      allNews = dEn.items || [];
      document.getElementById('updateTime').textContent = '更新 ' + formatTime(dEn.updated);
      document.getElementById('totalCount').textContent = dEn.total || allNews.length;

      if (rZh && rZh.ok) { const dZh = await rZh.json(); zhMap = {}; (dZh.items||[]).forEach(i => { zhMap[i.id] = i; }); }
      if (rStats && rStats.ok) { statsData = await rStats.json(); }
      if (rWeekly && rWeekly.ok) { weeklyData = await rWeekly.json(); }
      if (rBrief && rBrief.ok) { briefingData = await rBrief.json(); }
      if (rOutline && rOutline.ok) { outlineData = await rOutline.json(); }
      if (rScript && rScript.ok) { scriptData = await rScript.json(); }

      document.getElementById('skeletonContainer').style.display = 'none';
      renderWeekly();
      renderStats();
      renderCreator();
      render();
    } catch (e) {
      console.error(e);
      document.getElementById('skeletonContainer').style.display = 'none';
      document.getElementById('newsList').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }
  }

  function formatTime(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr), now = new Date();
    const diffMin = Math.floor((now - d) / 60000);
    if (diffMin < 1) return '刚刚';
    if (diffMin < 60) return diffMin + '分钟前';
    const diffHr = Math.floor(diffMin / 60);
    if (diffHr < 24) return diffHr + '小时前';
    const diffDay = Math.floor(diffHr / 24);
    if (diffDay < 7) return diffDay + '天前';
    return d.toLocaleDateString('zh-CN', { month:'short', day:'numeric' });
  }

  function t(n, field) {
    if (currentLang === 'en') return n[field] || '';
    const zh = zhMap[n.id];
    return (zh && zh[field + '_zh']) ? zh[field + '_zh'] : (n[field] || '');
  }

  // Creator panel
  var currentDiff = 'all';
  var copyTimer = null;

  function renderCreator() {
    var panel = document.getElementById('creatorPanel');
    if (!panel.classList.contains('open')) return;

    // Briefing
    var briefSec = document.getElementById('briefingSection');
    var briefText = document.getElementById('briefingText');
    var briefItems = document.getElementById('briefingItems');
    if (briefingData && briefingData.text) {
      briefSec.style.display = 'block';
      briefText.textContent = briefingData.text;
      briefItems.innerHTML = (briefingData.top_items || []).map(function(t) {
        return '<span style="display:inline-block;margin:2px 8px 2px 0;background:var(--tag-bg);padding:2px 8px;border-radius:8px;">' + esc(t) + '</span>';
      }).join('');
    } else {
      briefSec.style.display = 'none';
    }

    // Materials
    var diff = currentDiff;
    var materials = allNews.filter(function(n) {
      return diff === 'all' || n.difficulty === diff;
    });
    materials.sort(function(a, b) { return (b.score || 0) - (a.score || 0); });

    var matHTML = '';
    for (var mi = 0; mi < Math.min(materials.length, 30); mi++) {
      var item = materials[mi];
      var zh = zhMap[item.id] || {};
      var title = zh.title_zh || item.title || '';
      var facts = zh.key_facts || [];
      var quote = zh.notable_quote || {};
      var url = item.url || '';

      matHTML += '<div class="material-card">' +
        '<div class="mat-title"><a href="' + esc(url) + '" target="_blank" rel="noopener">' + esc(title) + '</a>' +
        ' <button class="copy-btn" data-copy="title" data-text="' + esc(title.replace(/"/g, '')) + '">复制标题</button></div>';

      if (facts.length > 0) {
        matHTML += '<div class="mat-facts">';
        for (var fi = 0; fi < facts.length; fi++) {
          matHTML += '• ' + esc(facts[fi]) +
            ' <button class="copy-btn" data-copy="fact" data-text="' + esc(facts[fi].replace(/"/g, '')) + '">复制</button><br>';
        }
        matHTML += '</div>';
      }

      if (quote.text || quote.zh) {
        matHTML += '<div class="mat-quote">';
        if (quote.text) matHTML += '"' + esc(quote.text) + '"';
        if (quote.zh) matHTML += (quote.text ? ' — ' : '') + esc(quote.zh);
        matHTML += ' <button class="copy-btn" data-copy="quote" data-text="' + esc((quote.zh || quote.text || '').replace(/"/g, '')) + '">复制</button>';
        matHTML += '</div>';
      }

      // Narrative angles
      var angles = item.narrative_angles || [];
      if (angles.length > 0) {
        matHTML += '<div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">角度: ';
        for (var ai = 0; ai < angles.length; ai++) {
          matHTML += '<span style="background:var(--tag-bg);padding:1px 6px;border-radius:6px;margin-right:4px;">' + esc(angles[ai]) + '</span>';
        }
        matHTML += '</div>';
      }

      matHTML += '</div>';
    }

    document.getElementById('materialList').innerHTML = matHTML || '<p style="color:var(--text-secondary);font-size:13px;">暂无匹配素材</p>';

    // Outline
    var outlineSec = document.getElementById('outlineSection');
    var outlineContent = document.getElementById('outlineContent');
    if (outlineData && outlineData.topic) {
      outlineSec.style.display = 'block';
      var olHTML = '<p style="font-weight:600;margin-bottom:8px;">' + esc(outlineData.topic) + '</p>';
      if (outlineData.hook) olHTML += '<p style="color:var(--accent);margin-bottom:8px;font-size:13px;">开篇: ' + esc(outlineData.hook) + '</p>';
      var sections = outlineData.sections || [];
      for (var si = 0; si < sections.length; si++) {
        var sec = sections[si];
        olHTML += '<div class="outline-section">' +
          '<h4>' + (si + 1) + '. ' + esc(sec.heading || '') + '</h4>' +
          (sec.content ? '<p>' + esc(sec.content) + '</p>' : '') +
          (sec.refs && sec.refs.length ? '<div class="outline-refs">参考: ' + esc(sec.refs.join(', ')) + '</div>' : '') +
        '</div>';
      }
      if (outlineData.conclusion) olHTML += '<p style="font-size:13px;margin-top:8px;color:var(--text-secondary);">' + esc(outlineData.conclusion) + '</p>';
      if (outlineData.suggested_title) olHTML += '<p style="font-size:12px;margin-top:4px;color:var(--accent);">建议标题: ' + esc(outlineData.suggested_title) + '</p>';
      outlineContent.innerHTML = olHTML;
    } else {
      outlineSec.style.display = 'none';
    }

    // Script
    var scriptSec = document.getElementById('scriptSection');
    var scriptContent = document.getElementById('scriptContent');
    if (scriptData && scriptData.topic) {
      scriptSec.style.display = 'block';
      var s30 = (scriptData.scripts || {}).s30 || (scriptData.scripts || {})['30s'] || '';
      var s60 = (scriptData.scripts || {}).s60 || (scriptData.scripts || {})['60s'] || '';
      scriptContent.innerHTML =
        '<p style="font-weight:600;margin-bottom:4px;">' + esc(scriptData.topic) + '</p>' +
        (scriptData.hook ? '<p style="color:var(--accent);font-size:13px;margin-bottom:8px;">钩子: ' + esc(scriptData.hook) + '</p>' : '') +
        '<div class="script-tabs">' +
          '<button class="script-tab active" data-dur="30s">30秒（~80字）</button>' +
          '<button class="script-tab" data-dur="60s">60秒（~180字）</button>' +
        '</div>' +
        '<div class="script-text" id="scriptText30s">' + esc(s30) + '</div>' +
        '<div class="script-text" id="scriptText60s" style="display:none;">' + esc(s60) + '</div>';
    } else {
      scriptSec.style.display = 'none';
    }

    // Copy button events (delegation)
    bindCreatorEvents();
  }

  function bindCreatorEvents() {
    // Copy buttons
    document.querySelectorAll('.copy-btn').forEach(function(el) {
      if (el._boundCopy) return;
      el._boundCopy = true;
      el.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        var text = el.dataset.text;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(function() {
            el.classList.add('copied');
            el.textContent = '已复制!';
            clearTimeout(copyTimer);
            copyTimer = setTimeout(function() {
              el.classList.remove('copied');
              el.textContent = el.dataset.copy === 'title' ? '复制标题' : '复制';
            }, 1500);
          });
        }
      });
    });

    // Script tabs
    document.querySelectorAll('.script-tab').forEach(function(el) {
      if (el._boundTab) return;
      el._boundTab = true;
      el.addEventListener('click', function() {
        document.querySelectorAll('.script-tab').forEach(function(t) { t.classList.remove('active'); });
        el.classList.add('active');
        document.getElementById('scriptText30s').style.display = el.dataset.dur === '30s' ? 'block' : 'none';
        document.getElementById('scriptText60s').style.display = el.dataset.dur === '60s' ? 'block' : 'none';
      });
    });
  }

    if (!statsData) return;

    document.getElementById('statsSources').innerHTML = (statsData.sources||[]).slice(0,10).map(s => `

        <span class="stat-bar-name">${esc(c.name)}</span>

  // Render
  function render() {
    if (currentCat === 'creator') {
      document.getElementById('newsList').style.display = 'none';
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('deepSearchResults').style.display = 'none';
      document.getElementById('creatorPanel').classList.add('open');
      renderCreator();
      return;
    }
    document.getElementById('creatorPanel').classList.remove('open');

    let filtered = [...allNews];
    if (currentCat !== 'all') {
      if (currentCat === 'favorites') {
        filtered = filtered.filter(function(n) { return isFaved(n.id); });
      } else {
        filtered = filtered.filter(function(n) { return n.category === currentCat; });
      }
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(n =>
        n.title.toLowerCase().includes(q) || t(n,'title').toLowerCase().includes(q) ||
        (n.summary||'').toLowerCase().includes(q) || t(n,'summary').toLowerCase().includes(q) ||
        (n.tags||[]).some(tg => tg.toLowerCase().includes(q))
      );
    }
    if (currentSort === 'hot') filtered.sort((a,b) => (b.score||0) - (a.score||0));
    else filtered.sort((a,b) => (b.published||'').localeCompare(a.published||''));

    document.getElementById('resultCount').textContent = filtered.length + ' 条结果';
    const listEl = document.getElementById('newsList'), emptyEl = document.getElementById('emptyState');

    if (filtered.length === 0) {
      listEl.style.display = 'none'; emptyEl.style.display = 'block'; return;
    }
    emptyEl.style.display = 'none'; listEl.style.display = 'block';

    var relatedMap = {};
    listEl.innerHTML = filtered.map(function(n) {
      var title = t(n, 'title'), summary = t(n, 'summary');
      var tags = (currentLang === 'zh' && zhMap[n.id] && zhMap[n.id].tags_zh) ? zhMap[n.id].tags_zh : (n.tags||[]);
      var isV = !!viewed[n.id];
      var faved = isFaved(n.id);
      var related = getRelated(n, filtered, 3);
      if (related.length > 0) relatedMap[n.id] = related;
      return '<article class="news-card' + (isV ? ' viewed' : '') + '" data-id="' + esc(n.id) + '">' +
        '<div class="card-meta">' +
          '<span class="viewed-dot" title="' + (isV ? '已读' : '未读') + '"></span>' +
          '<span class="card-source">' + esc(n.source) + '</span>' +
          (n.score ? '<span class="card-score">&#128293; ' + n.score + '</span>' : '') +
          (n.category ? '<span style="font-size:10px;color:var(--text-secondary)">' + (CAT_LABELS[n.category]||n.category) + '</span>' : '') +
          '<span class="card-date">' + formatTime(n.published) + '</span>' +
          '<button class="card-fav-btn' + (faved ? ' faved' : '') + '" data-favid="' + esc(n.id) + '" title="' + (faved ? '取消收藏' : '收藏') + '" style="margin-left:auto;"></button>' +
        '</div>' +
        '<h2 class="card-title"><a href="' + esc(n.url) + '" target="_blank" rel="noopener" data-linkid="' + esc(n.id) + '">' + esc(title) + '</a></h2>' +
        (summary ? '<p class="card-summary">' + esc(summary) + '</p>' : '') +
        (currentLang==='zh' && zhMap[n.id] && zhMap[n.id].oneliner ? '<p class="card-oneliner">&#128204; ' + esc(zhMap[n.id].oneliner) + '</p>' : '') +
        (tags.length ? '<div class="card-tags">' + tags.map(function(tg) { return '<span class="card-tag" data-tag="' + esc(tg) + '">' + esc(tg) + '</span>'; }).join('') + '</div>' : '') +
        (relatedMap[n.id] ? '<div class="related-section"><span class="related-label">相关:</span> ' + relatedMap[n.id].map(function(r) { return '<span class="related-item" data-nav="' + esc(r.id) + '">' + esc(t(r, 'title')).substring(0, 40) + '</span>'; }).join('') + '</div>' : '') +
      '</article>';
    }).join('');

    // Tag click → search
    listEl.querySelectorAll('.card-tag').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        document.getElementById('searchBox').value = el.dataset.tag;
        searchQuery = el.dataset.tag;
        render();
      });
    });

    // Favorite button click
    listEl.querySelectorAll('.card-fav-btn').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = el.dataset.favid;
        var card = el.closest('.news-card');
        var titleEl = card ? card.querySelector('.card-title a') : null;
        var sourceEl = card ? card.querySelector('.card-source') : null;
        var ttl = titleEl ? titleEl.textContent : '';
        var src = sourceEl ? sourceEl.textContent : '';
        toggleFavorite(id, ttl, src);
      });
    });

    // Link click → mark viewed
    listEl.querySelectorAll('.card-title a[data-linkid]').forEach(function(el) {
      el.addEventListener('click', function() {
        markViewed(el.dataset.linkid);
      });
    });

    // Related item click → scroll to card
    listEl.querySelectorAll('.related-item').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        var target = document.querySelector('.news-card[data-id="' + el.dataset.nav + '"]');
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          target.style.boxShadow = '0 0 0 3px var(--accent)';
          setTimeout(function() { target.style.boxShadow = ''; }, 2000);
        }
      });
    });
  }

  function esc(s) {
    const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
    return String(s).replace(/[&<>"']/g, c => map[c]);
  }

  // Filters
  document.querySelector('.filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    document.getElementById('deepSearchResults').style.display = 'none';
    render();
  });

  // Pagefind deep search
  let pagefind = null;
  (async function initPagefind() {
    try {
      pagefind = await import('/data/pagefind/pagefind.js');
    } catch(e) {
      // Pagefind not available (local file:// or missing index)
    }
  })();

  let deepSearchTimer = null;
  async function doDeepSearch(query) {
    var el = document.getElementById('deepSearchResults');
    if (!pagefind || !query || query.length < 2) {
      el.style.display = 'none';
      return;
    }
    try {
      var search = await pagefind.search(query);
      if (!search.results || search.results.length === 0) {
        el.style.display = 'none';
        return;
      }
      var results = [];
      for (var i = 0; i < Math.min(search.results.length, 10); i++) {
        results.push(await search.results[i].data());
      }
      var totalHits = results.length;
      el.style.display = 'block';
      el.innerHTML =
        '<div class="deep-results-title">搜索归档 — ' + totalHits + ' 条结果</div>' +
        results.map(function(r) {
          var meta = r.meta || {};
          var title = meta.title || '';
          var url = meta.url || '#';
          return '<div class="deep-result-card">' +
            '<div class="dr-title"><a href="' + esc(url) + '" target="_blank" rel="noopener">' + esc(title) + '</a></div>' +
            (r.excerpt ? '<div class="dr-excerpt">' + r.excerpt + '</div>' : '') +
            '<div class="dr-meta">' +
              (meta.source ? '<span class="dr-source">' + esc(meta.source) + '</span>' : '') +
              (meta.published ? '<span>' + formatTime(meta.published) + '</span>' : '') +
            '</div>' +
          '</div>';
        }).join('');
    } catch(e) {
      el.style.display = 'none';
    }
  }

  document.getElementById('searchBox').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    clearTimeout(deepSearchTimer);
    deepSearchTimer = setTimeout(function() { doDeepSearch(searchQuery); }, 300);
    render();
  });

  // Sort
  document.getElementById('sortHot').addEventListener('click', () => {
    currentSort = 'hot';
    document.getElementById('sortHot').classList.add('active-sort');
    document.getElementById('sortNew').classList.remove('active-sort');
    render();
  });
  document.getElementById('sortNew').addEventListener('click', () => {
    currentSort = 'new';
    document.getElementById('sortNew').classList.add('active-sort');
    document.getElementById('sortHot').classList.remove('active-sort');
    render();
  });

  loadAll();
})();
</script>
</body>
